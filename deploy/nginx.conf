# ═══════════════════════════════════════════════════════════
# Nginx — ITZ Cases de Sucesso
# Salve em: /etc/nginx/sites-available/itz-cases
# Ative com:
#   sudo ln -s /etc/nginx/sites-available/itz-cases /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Depois rode Certbot para SSL:
#   sudo certbot --nginx -d cases.itzinteligencia.com.br
# ═══════════════════════════════════════════════════════════

# Redirect HTTP → HTTPS (só funciona depois que o Certbot rodar — comente se não tiver SSL ainda)
server {
    listen 80;
    listen [::]:80;
    server_name cases.itzinteligencia.com.br;

    # Após SSL ativo, descomente:
    # return 301 https://$host$request_uri;

    root /var/www/itz-cases/frontend;
    index index.html;

    # Frontend estático
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # Assets com cache longo
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Proxy para API Node
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Segurança básica
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Compressão
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Logs
    access_log /var/log/nginx/itz-cases-access.log;
    error_log  /var/log/nginx/itz-cases-error.log;
}

# Após rodar o Certbot, ele cria/edita a seção HTTPS automaticamente.
# Algo assim:
#
# server {
#     listen 443 ssl http2;
#     listen [::]:443 ssl http2;
#     server_name cases.itzinteligencia.com.br;
#
#     ssl_certificate     /etc/letsencrypt/live/cases.itzinteligencia.com.br/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/cases.itzinteligencia.com.br/privkey.pem;
#     include /etc/letsencrypt/options-ssl-nginx.conf;
#     ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
#
#     add_header Strict-Transport-Security "max-age=31536000" always;
#
#     # ... (mesmo conteúdo do bloco acima: root, location /, location /api/, etc.)
# }
